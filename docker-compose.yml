name: for-production
services:
  webserver:
    image: nginx:latest
    container_name: asset-box-web
    ports:
      - "80:80"
      - "443:443"
    networks:
      - assetbox
    depends_on:
      - backend
    volumes:
      - './libs/app1.conf:/etc/nginx/conf.d/default.conf'
  backend:
    image: ghcr.io/got2026/shooong.backend:latest
    container_name: asset-box-backend
    depends_on:
      - db
    env_file:
      - .env.development
    ports:
      - "8080:8080"
    networks:
      - assetbox
  db:
    image: mysql:latest
    container_name: asset-box-mysql
    volumes:
      - mysql_data:/var/lib/mysql
    env_file:
      - .env.development
    networks:
      - assetbox
volumes:
  mysql_data:
networks:
  assetbox:
    driver: bridge