name: Build and Release Docker Image
on:
  push:
    branches:
      - main
env:
  REGISTRY: ghcr.io
jobs:
  build-push-image:
    name: 도커이미지 빌드 및 푸시
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Repository로부터 Worker Instance로 파일을 checkout
        uses: actions/checkout@v6
      - name: gradlew 권한 설정
        run: chmod +x ./gradlew
      - name: JDK 설정
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
      - name: env 파일 생성
        run: |
          echo "DB_URL=${{ secrets.DB_URL }}" >> .env.development
          echo "DB_USERNAME=${{ secrets.DB_USERNAME }}" >> .env.development
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env.development
          echo "BASE_URL=${{ secrets.BASE_URL }}" >> .env.development
          echo "REFRESHTOKENTIME=${{ secrets.REFRESHTOKENTIME }}" >> .env.development
          echo "BASE_64_KEY=${{ secrets.BASE_64_KEY }}" >> .env.development
          echo "ACCESSTOKENTIME=${{ secrets.ACCESSTOKENTIME }}" >> .env.development
      - name: env 확인
        run: |
          ls -al
          cat .env.development | sed 's/=.*/=***/'
      - name: Gradle을 통한 JAR파일 빌드
        run: ./gradlew build
      - name: 레지스트리 로그인
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: 메타데이터 추출.
        uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=sha
            type=raw,value=latest
      - name: 빌드 및 이미지 푸시
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}