name: Build and Release Docker Image
on:
  push:
    branches:
      - main
env:
  REGISTRY: ghcr.io
jobs:
  build-push-image:
    name: 도커이미지 빌드 및 푸시
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Repository로부터 Worker Instance로 파일을 checkout
        uses: actions/checkout@v6
      - name: gradlew 권한 설정
        run: chmod +x ./gradlew
      - name: JDK 설정
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
      - name: env 파일 생성
        run: |
          cat <<EOF > .env.development
          DB_URL=${{ secrets.DB_URL }}
          DB_USERNAME=${{ secrets.DB_USERNAME }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          BASE_URL=${{ secrets.BASE_URL }}
          REFRESHTOKENTIME=${{ secrets.REFRESHTOKENTIME }}
          BASE_64_KEY=${{ secrets.BASE_64_KEY }}
          ACCESSTOKENTIME=${{ secrets.ACCESSTOKENTIME }}
          EOF
      - name: DB URL 존재 확인
        run: |
          grep DB_URL .env.development
      - name: Gradle을 통한 JAR파일 빌드
        run: ./gradlew build
      - name: 레지스트리 로그인
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: 메타데이터 추출.
        uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=sha
            type=raw,value=latest
      - name: 빌드 및 이미지 푸시
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}